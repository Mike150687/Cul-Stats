// ─────────────────────────────────────────────────────────────────────
// GAA Match Tracker — full app component (drop-in for Vite/CRA)
//
// Single React module containing:
//   · Design tokens + component CSS (injected on mount)
//   · Data layer (constants, real 12-sector xP model, possessions, runs)
//   · Pitch SVG components + icon set
//   · 7 match-view tabs (Actions, Live, Detail, Lineup, Map, Chart, Log)
//   · 6 setup sections (Teams, Jerseys, Win Conditions, Play Progression,
//     Saved Matches, Season Stats)
//   · Action modal, AI Analyst modal
//
// To wire to your existing app:
//   1. `npm install` (React 18 in your project)
//   2. Import { default as GAATracker } from "./GAATracker.jsx"
//   3. Render <GAATracker/> as your root, or wrap your existing data layer
//      around it via the props the components consume.
//   4. To persist matches: replace EVENTS seed with reads from your
//      IndexedDB/Supabase, and wrap setEvents to also write back.
//   5. To use the AI Analyst outside Claude: replace window.claude.complete
//      with a fetch() to your backend proxy.
//
// Mock data is included so the app boots standalone — swap it for your
// real event stream + saved-matches storage when you're ready.
// ─────────────────────────────────────────────────────────────────────

const {
  useState,
  useEffect,
  useMemo,
  useRef
} = React;

// ─── Injected stylesheet ─────────────────────────────────────────────
const STYLES = `/* ─── GAA Tracker · Design tokens ────────────────────────────────────── */
:root{
  /* Surfaces — cool neutral, deep but not pitch-black */
  --bg:        oklch(0.155 0.008 250);
  --bg-1:      oklch(0.185 0.009 250);
  --bg-2:      oklch(0.215 0.010 250);
  --bg-3:      oklch(0.250 0.012 250);
  --line:      oklch(0.30 0.014 250 / 0.6);
  --line-soft: oklch(0.30 0.014 250 / 0.25);

  /* Type */
  --t1: oklch(0.97 0.004 250);
  --t2: oklch(0.78 0.008 250);
  --t3: oklch(0.58 0.012 250);
  --t4: oklch(0.42 0.012 250);

  /* Accents — single chroma so they harmonise */
  --gold:   oklch(0.78 0.13 80);
  --gold-d: oklch(0.78 0.13 80 / 0.14);
  --home:   oklch(0.68 0.14 235);
  --home-d: oklch(0.68 0.14 235 / 0.14);
  --away:   oklch(0.65 0.18 25);
  --away-d: oklch(0.65 0.18 25 / 0.14);
  --score:  oklch(0.72 0.15 155);
  --score-d:oklch(0.72 0.15 155 / 0.14);
  --wide:   oklch(0.70 0.16 45);
  --miss:   oklch(0.68 0.12 35);
  --violet: oklch(0.68 0.16 295);

  /* Pitch */
  --pitch:   oklch(0.38 0.08 145);
  --pitch-d: oklch(0.34 0.08 145);
  --pitch-line: oklch(0.95 0.01 145 / 0.55);

  /* Type */
  --fd: 'Bricolage Grotesque', system-ui, sans-serif;
  --fui:'Manrope', system-ui, sans-serif;
  --fm: 'JetBrains Mono', ui-monospace, monospace;

  --r1: 4px;  --r2: 8px;  --r3: 12px;  --r4: 16px;  --r5: 22px;
}

*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; min-height:100%; background:var(--bg); color:var(--t1); font-family:var(--fui); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; }
button,input,select,textarea{ font:inherit; color:inherit; }
button{ background:none; border:none; cursor:pointer; padding:0; }
img{ display:block; max-width:100%; }
::-webkit-scrollbar{ width:6px; height:6px; }
::-webkit-scrollbar-thumb{ background:var(--bg-3); border-radius:3px; }
::-webkit-scrollbar-thumb:hover{ background:var(--line); }

/* ─── App shell ──────────────────────────────────────────────────────── */
.app{ display:grid; grid-template-rows:auto auto 1fr; min-height:100vh; max-width:1480px; margin:0 auto; border-left:1px solid var(--line-soft); border-right:1px solid var(--line-soft); }

/* ─── Scoreboard ─────────────────────────────────────────────────────── */
.sb{ display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; gap:18px; padding:18px 24px 16px; background:linear-gradient(180deg, var(--bg-1) 0%, var(--bg) 100%); border-bottom:1px solid var(--line-soft); position:relative; }
.sb::before{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px; background:linear-gradient(90deg, transparent, var(--gold) 50%, transparent); opacity:.35; }
.sb-team{ display:flex; align-items:center; gap:14px; min-width:0; }
.sb-team.away{ flex-direction:row-reverse; text-align:right; }
.sb-crest{ width:48px; height:48px; border-radius:6px; object-fit:contain; background:var(--bg-2); border:1px solid var(--line-soft); flex-shrink:0; padding:4px; }
.sb-team-info{ min-width:0; }
.sb-team.away .sb-team-info{ text-align:right; }
.sb-team-label{ font-family:var(--fui); font-size:10px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--t3); margin-bottom:2px; }
.sb-team-name{ font-family:var(--fd); font-weight:600; font-size:22px; letter-spacing:-0.01em; color:var(--t1); line-height:1.05; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.sb-clock{ font-family:var(--fm); font-size:13px; color:var(--gold); letter-spacing:0.06em; white-space:nowrap; }
.sb-half{ font-family:var(--fui); font-size:10px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--t3); white-space:nowrap; }

/* ─── Score detail line (G-2pt-Pt) ─── */
.sb-breakdown{ display:flex; gap:8px; font-family:var(--fm); font-size:11px; color:var(--t3); margin-top:4px; }
.sb-breakdown b{ color:var(--t2); font-weight:500; }

/* ─── Toolbar ────────────────────────────────────────────────────────── */
.toolbar{ display:flex; align-items:center; gap:6px; padding:9px 24px; background:var(--bg-1); border-bottom:1px solid var(--line-soft); flex-wrap:wrap; }
.tbtn{ display:inline-flex; align-items:center; gap:6px; padding:6px 11px; border:1px solid var(--line-soft); border-radius:100px; font-size:11px; font-weight:600; color:var(--t2); letter-spacing:0.02em; transition:.12s; white-space:nowrap; }
.tbtn:hover{ border-color:var(--line); color:var(--t1); }
.tbtn.primary{ background:var(--gold); color:#0b0c11; border-color:var(--gold); font-weight:700; }
.tbtn.primary:hover{ filter:brightness(1.08); }
.tbtn.danger{ color:var(--away); border-color:oklch(0.65 0.18 25 / 0.35); }
.tbtn.start{ color:var(--score); border-color:oklch(0.72 0.15 155 / 0.35); }
.tbtn.start:hover{ background:var(--score-d); }
.tbtn .ico{ width:13px; height:13px; }
.toolbar .spacer{ flex:1; }
.toolbar .sep{ width:1px; align-self:stretch; background:var(--line-soft); margin:2px 4px; }

/* ─── Tab nav ────────────────────────────────────────────────────────── */
.tabs{ display:flex; align-items:center; padding:0 16px; background:var(--bg-1); border-bottom:1px solid var(--line-soft); overflow-x:auto; scrollbar-width:none; position:sticky; top:0; z-index:10; }
.tabs::-webkit-scrollbar{ display:none; }
.tab{ display:inline-flex; align-items:center; gap:8px; padding:14px 18px; border-bottom:2px solid transparent; font-family:var(--fui); font-size:12px; font-weight:600; letter-spacing:0.06em; color:var(--t3); text-transform:uppercase; transition:color .12s; white-space:nowrap; flex-shrink:0; }
.tab:hover{ color:var(--t1); }
.tab .ico{ width:15px; height:15px; opacity:.7; }
.tab.on{ color:var(--t1); border-bottom-color:var(--gold); }
.tab.on .ico{ opacity:1; color:var(--gold); }
.tab.entry{ color:var(--home); }
.tab.entry.on{ border-bottom-color:var(--home); color:var(--home); }
.tabs .tab-sep{ width:1px; height:18px; background:var(--line-soft); margin:0 6px; flex-shrink:0; }

/* ─── Content area ───────────────────────────────────────────────────── */
.content{ overflow:auto; padding:24px; }
.col-2{ display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
.col-3{ display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.col-4{ display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
@media (max-width:900px){ .col-2,.col-3,.col-4{ grid-template-columns:1fr; } }

/* ─── Section title ──────────────────────────────────────────────────── */
.sec{ display:flex; align-items:baseline; gap:12px; margin-bottom:12px; }
.sec-t{ font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--t2); white-space:nowrap; }
.sec-rule{ flex:1; height:1px; background:var(--line-soft); }
.sec-aux{ font-family:var(--fm); font-size:10px; color:var(--t3); letter-spacing:0.04em; }

/* ─── Card ──────────────────────────────────────────────────────────── */
.card{ background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r3); overflow:hidden; }
.card-h{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--line-soft); }
.card-h h3{ margin:0; font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--t2); }
.card-b{ padding:16px; }
.card-b.tight{ padding:10px 14px; }
.card-b.flush{ padding:0; }

/* ─── KPI tile ───────────────────────────────────────────────────────── */
.kpi{ background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r3); padding:16px 18px; }
.kpi-l{ font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--t3); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.kpi-v{ font-family:var(--fd); font-weight:600; font-size:34px; letter-spacing:-0.02em; line-height:1; color:var(--t1); font-variant-numeric:tabular-nums; white-space:nowrap; }
.kpi-v.h{ color:var(--home); } .kpi-v.a{ color:var(--away); }
.kpi-s{ font-family:var(--fm); font-size:11px; color:var(--t3); margin-top:5px; letter-spacing:0.02em; }
.kpi-s .pos{ color:var(--score); } .kpi-s .neg{ color:var(--away); }
.kpi-spark{ margin-top:8px; }

/* ─── Stat row + comparison ──────────────────────────────────────────── */
.cmp{ display:grid; grid-template-columns: 1fr 96px 1fr; gap:0; }
.cmp-row{ display:contents; }
.cmp-row > *{ padding:8px 14px; border-bottom:1px solid var(--line-soft); align-items:center; display:flex; }
.cmp-row:last-child > *{ border-bottom:0; }
.cmp-h{ justify-content:flex-end; font-family:var(--fm); font-size:14px; color:var(--t1); font-variant-numeric:tabular-nums; }
.cmp-h.win{ color:var(--home); font-weight:700; }
.cmp-a{ justify-content:flex-start; font-family:var(--fm); font-size:14px; color:var(--t1); font-variant-numeric:tabular-nums; }
.cmp-a.win{ color:var(--away); font-weight:700; }
.cmp-l{ justify-content:center; font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--t3); border-left:1px solid var(--line-soft); border-right:1px solid var(--line-soft); }

/* possession bar */
.possbar{ display:flex; height:6px; border-radius:3px; overflow:hidden; background:var(--bg-3); margin:10px 0 4px; }
.possbar .h{ background:var(--home); }
.possbar .a{ background:var(--away); }

/* ─── Chip / filter ──────────────────────────────────────────────────── */
.chip{ display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:100px; background:var(--bg-2); border:1px solid var(--line-soft); font-size:11px; font-weight:600; color:var(--t2); letter-spacing:0.04em; transition:.12s; }
.chip:hover{ border-color:var(--line); color:var(--t1); }
.chip.on{ background:var(--gold-d); border-color:var(--gold); color:var(--gold); }
.chip.h.on{ background:var(--home-d); border-color:var(--home); color:var(--home); }
.chip.a.on{ background:var(--away-d); border-color:var(--away); color:var(--away); }

/* ─── Big action button (Actions tab) ────────────────────────────────── */
.qbtn{ display:flex; flex-direction:column; align-items:flex-start; gap:8px; padding:16px 16px 14px; background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r3); transition:.12s; text-align:left; min-height:110px; position:relative; overflow:hidden; }
.qbtn:hover{ border-color:var(--line); transform:translateY(-1px); background:var(--bg-2); }
.qbtn:active{ transform:translateY(0); }
.qbtn .ico{ width:22px; height:22px; }
.qbtn .lab{ font-family:var(--fd); font-weight:600; font-size:18px; letter-spacing:-0.01em; color:var(--t1); }
.qbtn .sub{ font-family:var(--fm); font-size:10px; color:var(--t3); letter-spacing:0.04em; margin-top:auto; }
.qbtn::before{ content:""; position:absolute; inset:0 auto 0 0; width:3px; background:var(--accent, var(--gold)); opacity:.7; }
.qbtn.score::before{ background:var(--score); }
.qbtn.miss::before{ background:var(--wide); }
.qbtn.tow::before{ background:var(--home); }
.qbtn.tol::before{ background:var(--away); }
.qbtn.foul::before{ background:var(--gold); }
.qbtn.card::before{ background:var(--away); }
.qbtn.ko::before{ background:var(--violet); }
.qbtn.sub::before{ background:oklch(0.68 0.10 200); }

/* compact action button */
.abtn{ display:flex; align-items:center; gap:10px; padding:11px 13px; background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r2); transition:.12s; text-align:left; }
.abtn:hover{ border-color:var(--line); background:var(--bg-2); }
.abtn .ico{ width:16px; height:16px; color:var(--t2); }
.abtn .lab{ font-size:13px; font-weight:600; color:var(--t1); }
.abtn .sub{ font-family:var(--fm); font-size:10px; color:var(--t3); margin-left:auto; }

/* team toggle (segmented) */
.seg{ display:inline-flex; background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r2); padding:3px; gap:2px; }
.seg button{ padding:7px 16px; border-radius:var(--r1); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--t3); transition:.12s; display:inline-flex; align-items:center; gap:6px; }
.seg button:hover{ color:var(--t1); }
.seg button.on{ color:var(--t1); background:var(--bg-3); }
.seg button.on .dot{ background:currentColor; }
.seg button.on.h{ color:var(--home); }
.seg button.on.a{ color:var(--away); }
.seg .dot{ width:6px; height:6px; border-radius:50%; background:var(--t4); }

/* event row */
.evrow{ display:grid; grid-template-columns: 56px 28px 1fr auto auto; gap:12px; align-items:center; padding:10px 14px; border-bottom:1px solid var(--line-soft); transition:.1s; }
.evrow:last-child{ border-bottom:0; }
.evrow:hover{ background:var(--bg-2); }
.ev-time{ font-family:var(--fm); font-size:11px; color:var(--t3); letter-spacing:0.02em; }
.ev-dot{ width:8px; height:8px; border-radius:50%; }
.ev-main{ font-size:13px; color:var(--t1); }
.ev-main b{ color:var(--t1); font-weight:600; }
.ev-tag{ font-family:var(--fm); font-size:10px; color:var(--t3); }
.ev-pts{ font-family:var(--fm); font-size:11px; font-weight:600; color:var(--score); padding:2px 8px; background:var(--score-d); border-radius:100px; }
.ev-pts.miss{ color:var(--wide); background:oklch(0.70 0.16 45 / 0.14); }

/* table */
.tbl{ width:100%; border-collapse:collapse; }
.tbl th{ text-align:left; padding:9px 12px; font-family:var(--fui); font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--t3); border-bottom:1px solid var(--line-soft); background:var(--bg); }
.tbl td{ padding:10px 12px; font-size:12px; border-bottom:1px solid var(--line-soft); color:var(--t2); }
.tbl tbody tr:hover{ background:var(--bg-2); }
.tbl td.num{ font-family:var(--fm); font-variant-numeric:tabular-nums; text-align:right; color:var(--t1); }
.tbl td.player{ color:var(--t1); font-weight:500; }
.tbl td .pn{ display:inline-block; width:22px; height:22px; line-height:22px; text-align:center; background:var(--bg-2); border-radius:var(--r1); font-family:var(--fm); font-size:10px; color:var(--gold); margin-right:8px; }
.tbl tr.tot td{ background:var(--bg); font-weight:700; color:var(--t1); border-top:1px solid var(--line); }

/* Pitch wrapper */
.pitch-wrap{ background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r3); padding:12px; }

/* sparkline / mini chart */
.spark{ width:100%; height:36px; display:block; }

/* keyframes */
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 oklch(0.72 0.15 155 / 0.4); } 50%{ box-shadow:0 0 0 6px oklch(0.72 0.15 155 / 0); } }

/* responsive */
@media (max-width:900px){
  .sb{ grid-template-columns:1fr; gap:12px; }
  .sb-centre{ order:-1; }
  .sb-team.away{ flex-direction:row; text-align:left; }
  .sb-team.away .sb-team-info{ text-align:left; }
  .content{ padding:16px; }
}

/* modal */
.modal-shade{ position:fixed; inset:0; background:oklch(0.155 0.008 250 / 0.85); backdrop-filter:blur(4px); z-index:60; display:flex; align-items:center; justify-content:center; padding:24px; }
.modal{ width:100%; max-width:520px; max-height:90vh; background:var(--bg-1); border:1px solid var(--line); border-radius:var(--r4); display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 80px oklch(0 0 0 / 0.6); }
.modal-h{ display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--line-soft); }
.modal-h .tag{ font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--t3); }
.modal-h .ttl{ font-family:var(--fd); font-size:18px; font-weight:600; color:var(--t1); margin-top:2px; letter-spacing:-0.01em; }
.modal-close{ width:32px; height:32px; border-radius:50%; background:var(--bg-2); color:var(--t2); display:flex; align-items:center; justify-content:center; transition:.12s; }
.modal-close:hover{ background:var(--bg-3); color:var(--t1); }
.modal-b{ flex:1; overflow:auto; padding:18px 20px 22px; }
@keyframes popin{ from{ transform:translateY(8px); opacity:0; } to{ transform:translateY(0); opacity:1; } }

/* outcome grid in modal */
.ogrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.ocard{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 8px; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r2); transition:.12s; }
.ocard:hover{ background:var(--bg-3); border-color:var(--line); }
.ocard .ico{ width:20px; height:20px; }
.ocard .l{ font-size:11px; font-weight:600; color:var(--t1); }
.ocard .v{ font-family:var(--fm); font-size:10px; padding:1px 7px; border-radius:100px; }
.ocard .v.s{ background:var(--score-d); color:var(--score); }
.ocard .v.m{ background:oklch(0.70 0.16 45 / 0.14); color:var(--wide); }

/* setup */
.setup{ max-width:760px; margin:0 auto; padding:40px 24px; }
.field{ display:block; margin-bottom:14px; }
.field-l{ font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--t3); margin-bottom:6px; }
.inp{ width:100%; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r2); padding:11px 14px; font-size:14px; color:var(--t1); transition:.12s; }
.inp:focus{ outline:none; border-color:var(--gold); }

    return `<div style="background:#eee;border-radius:4px;height:10px;position:relative">

    </div>`;

// ─── Win Probability ─────────────────────────────────────────────────
// Gaussian model: remaining score swing ~ N(0,σ²), σ shrinks with time.
// Empirical full-match σ ≈ 8 pts. Returns 0-100 home win probability.
function winProb(events, seconds, half, halfLength) {
  const evs = events.filter(e => !e.ignored);
  const hS = scoreOf(evs, "home").total;
  const aS = scoreOf(evs, "away").total;
  const diff = hS - aS;
  const halfSecs = (halfLength || 35) * 60;
  const elapsed = Math.min(((half || 1) - 1) * halfSecs + (seconds || 0), 2 * halfSecs);
  const frac = elapsed / (2 * halfSecs);
  if (frac >= 0.995) return diff > 0 ? 100 : diff < 0 ? 0 : 50;
  const sigma = Math.max(8 * Math.sqrt(1 - frac), 0.3);
  const z = diff / sigma;
  const phi = x => {
    const t = 1 / (1 + 0.2316419 * Math.abs(x));
    const d = 0.3989423 * Math.exp(-x * x / 2);
    const p = t * (0.3193815 + t * (-0.3565638 + t * (1.7814779 + t * (-1.8212560 + t * 1.3302744))));
    return x >= 0 ? 1 - d * p : d * p;
  };
  return Math.round(phi(z) * 100);
}
