// ---------------------------------------------------------------------
// GAA Match Tracker - full app component (drop-in for Vite/CRA)
//
// Single React module containing:
//   - Design tokens + component CSS (injected on mount)
//   - Data layer (constants, real 12-sector xP model, possessions, runs)
//   - Pitch SVG components + icon set
//   - 7 match-view tabs (Actions, Live, Detail, Lineup, Map, Chart, Log)
//   - 6 setup sections (Teams, Jerseys, Win Conditions, Play Progression,
//     Saved Matches, Season Stats)
//   - Action modal, AI Analyst modal
//
// To wire to your existing app:
//   1. `npm install` (React 18 in your project)
//   2. Import { default as GAATracker } from "./GAATracker.jsx"
//   3. Render <GAATracker/> as your root, or wrap your existing data layer
//      around it via the props the components consume.
//   4. To persist matches: replace EVENTS seed with reads from your
//      IndexedDB/Supabase, and wrap setEvents to also write back.
//   5. To use the AI Analyst outside Claude: replace window.claude.complete
//      with a fetch() to your backend proxy.
//
// Mock data is included so the app boots standalone - swap it for your
// real event stream + saved-matches storage when you're ready.
// ---------------------------------------------------------------------

/* ─── GAA Tracker · Design tokens ────────────────────────────────────── */
:root{
  /* Surfaces — cool neutral, deep but not pitch-black */
  --bg:        oklch(0.155 0.008 250);
  --bg-1:      oklch(0.185 0.009 250);
  --bg-2:      oklch(0.215 0.010 250);
  --bg-3:      oklch(0.250 0.012 250);
  --line:      oklch(0.30 0.014 250 / 0.6);
  --line-soft: oklch(0.30 0.014 250 / 0.25);

  /* Type */
  --t1: oklch(0.97 0.004 250);
  --t2: oklch(0.78 0.008 250);
  --t3: oklch(0.58 0.012 250);
  --t4: oklch(0.42 0.012 250);

  /* Accents — single chroma so they harmonise */
  --gold:   oklch(0.78 0.13 80);
  --gold-d: oklch(0.78 0.13 80 / 0.14);
  --home:   oklch(0.68 0.14 235);
  --home-d: oklch(0.68 0.14 235 / 0.14);
  --away:   oklch(0.65 0.18 25);
  --away-d: oklch(0.65 0.18 25 / 0.14);
  /* Colour-wash variants — lighter (text on tint) + deep (gradient base) */
  --homeL:  oklch(0.80 0.12 235);
  --homeDp: oklch(0.42 0.13 240);
  --awayL:  oklch(0.78 0.15 27);
  --awayDp: oklch(0.40 0.16 25);
  --score:  oklch(0.72 0.15 155);
  --score-d:oklch(0.72 0.15 155 / 0.14);
  --wide:   oklch(0.70 0.16 45);
  --miss:   oklch(0.68 0.12 35);
  --violet: oklch(0.68 0.16 295);

  /* Pitch — floodlit night, lets vivid markers pop */
  --pitch:   oklch(0.32 0.045 150);
  --pitch-d: oklch(0.245 0.040 152);
  --pitch-line: oklch(0.96 0.012 150 / 0.62);

  /* Type */
  --fd: 'Bricolage Grotesque', system-ui, sans-serif;
  --fui:'Manrope', system-ui, sans-serif;
  --fm: 'JetBrains Mono', ui-monospace, monospace;
    --fCond: var(--fui); --line-x: var(--line-soft);

  --r1: 4px;  --r2: 8px;  --r3: 12px;  --r4: 16px;  --r5: 22px;
  --wire2: oklch(0.35 0.01 250 / 0.35);
}

/* ─── Light mode ─── */
body.light, .app.light{
  --bg:#eef0f3; --bg-1:#ffffff; --bg-2:#f4f5f8; --bg-3:#e6e9ee;
  --t1:#14181f; --t2:#39414c; --t3:#66707e; --t4:#96a0ad;
  --line: oklch(0.2 0.01 250 / 0.28); --line-soft: oklch(0.2 0.01 250 / 0.14);
  --score-d: oklch(0.55 0.16 150 / 0.10);
}
body.light .card, .app.light .card{ box-shadow:0 1px 3px oklch(0 0 0 / 0.08); }

*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; min-height:100%; background:var(--bg); color:var(--t1); font-family:var(--fui); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; }
button,input,select,textarea{ font:inherit; color:inherit; }
button{ background:none; border:none; cursor:pointer; padding:0; }
img{ display:block; max-width:100%; }
::-webkit-scrollbar{ width:6px; height:6px; }
::-webkit-scrollbar-thumb{ background:var(--bg-3); border-radius:3px; }
::-webkit-scrollbar-thumb:hover{ background:var(--line); }

/* ─── App shell ──────────────────────────────────────────────────────── */
.app{ display:grid; grid-template-rows:auto auto 1fr; min-height:100vh; max-width:1480px; margin:0 auto; border-left:1px solid var(--line-soft); border-right:1px solid var(--line-soft); }

/* ─── Scoreboard ─────────────────────────────────────────────────────── */
.sb{ padding:18px 24px 16px; background:var(--bg); border-bottom:1px solid var(--line-soft); }
.sb-bug{ display:grid; grid-template-columns:1fr 190px 1fr; align-items:stretch; height:150px; border-radius:var(--r4); overflow:hidden; box-shadow:0 22px 60px oklch(0 0 0 / 0.5); }
.sb-side{ position:relative; display:flex; align-items:center; gap:16px; padding:0 26px; overflow:hidden; min-width:0; }
.sb-side.h{ background:linear-gradient(110deg, var(--washD), var(--wash)); }
.sb-side.a{ background:linear-gradient(250deg, var(--washD), var(--wash)); flex-direction:row-reverse; }
.sb-side::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,.16), transparent 45%); pointer-events:none; }
.sb-side::after{ content:""; position:absolute; bottom:0; left:0; right:0; height:42%; background:linear-gradient(180deg, transparent, rgba(0,0,0,.30)); pointer-events:none; }
.sb-tinfo{ position:relative; z-index:1; min-width:0; }
.sb-side.a .sb-tinfo{ text-align:right; }
.sb-role{ font-family:var(--fui); font-size:10px; font-weight:800; letter-spacing:0.28em; color:rgba(255,255,255,.72); text-transform:uppercase; }
.sb-name{ font-family:var(--fd); font-weight:700; font-size:clamp(20px, 2.3vw, 30px); line-height:1.02; margin-top:5px; color:#fff; text-shadow:0 2px 12px rgba(0,0,0,.35); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:130px; }
.sb-scr{ position:relative; z-index:1; margin-left:auto; text-align:right; min-width:0; }
.sb-side.a .sb-scr{ margin-left:0; margin-right:auto; text-align:left; }
.sb-gaascore{ font-family:var(--fd); font-weight:700; font-size:clamp(34px, 4vw, 54px); line-height:.82; color:#fff; font-variant-numeric:tabular-nums; text-shadow:0 3px 18px rgba(0,0,0,.4); white-space:nowrap; }
.sb-total{ font-family:var(--fm); font-size:12px; color:rgba(255,255,255,.80); letter-spacing:0.08em; margin-top:9px; }
.sb-centre{ background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; position:relative; z-index:2; box-shadow:0 0 44px oklch(0 0 0 / 0.6); }
.sb-cstatus{ display:inline-flex; align-items:center; gap:7px; font-family:var(--fui); font-size:11px; font-weight:800; letter-spacing:0.2em; color:var(--score); text-transform:uppercase; }
.sb-cstatus.ht{ color:var(--gold); } .sb-cstatus.ft,.sb-cstatus.pre{ color:var(--t3); }
.sb-dot{ width:8px; height:8px; border-radius:50%; background:var(--score); }
.sb-dot.on{ animation:pulse 1.5s ease-in-out infinite; }
.sb-cstatus.ht .sb-dot{ background:var(--gold); } .sb-cstatus.ft .sb-dot,.sb-cstatus.pre .sb-dot{ background:var(--t4); }
.sb-clock{ font-family:var(--fd); font-weight:700; font-size:34px; color:#fff; font-variant-numeric:tabular-nums; line-height:1; }
.sb-meta{ font-family:var(--fui); font-size:9px; font-weight:800; letter-spacing:0.08em; color:var(--t4); text-transform:uppercase; text-align:center; max-width:182px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Fixed mini-scoreboard — slides in once the full bug has scrolled away */
.sb-mini{ position:fixed; top:0; left:0; right:0; z-index:30; height:52px; border-bottom:1px solid var(--line); transform:translateY(-110%); transition:transform .26s ease; box-shadow:0 8px 26px oklch(0 0 0 / 0.45); background:linear-gradient(90deg, color-mix(in oklab, var(--home) 13%, var(--bg-1)), var(--bg-1) 34%, var(--bg-1) 66%, color-mix(in oklab, var(--away) 13%, var(--bg-1))); }
.sb-mini.show{ transform:translateY(0); }
.sb-mini-inner{ width:100%; max-width:1480px; height:100%; margin:0 auto; padding:0 24px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:16px; }
.sb-mini-team{ display:flex; align-items:center; gap:11px; min-width:0; }
.sb-mini-team.h{ justify-content:flex-end; }
.sb-mini-team.a{ justify-content:flex-start; }
.sb-mini-team .nm{ font-family:var(--fd); font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-mini-team.h .nm{ color:var(--homeL); }
.sb-mini-team.a .nm{ color:var(--awayL); }
.sb-mini-team .sc{ font-family:var(--fd); font-weight:700; font-size:21px; color:#fff; font-variant-numeric:tabular-nums; white-space:nowrap; }
.sb-mini-c{ display:flex; align-items:center; gap:8px; white-space:nowrap; }
.sb-mini-c .ck{ font-family:var(--fd); font-weight:700; font-size:17px; color:#fff; font-variant-numeric:tabular-nums; }

/* ─── Toolbar ────────────────────────────────────────────────────────── */
.toolbar{ display:flex; align-items:center; gap:6px; padding:9px 24px; background:var(--bg-1); border-bottom:1px solid var(--line-soft); flex-wrap:wrap; }
.tbtn{ display:inline-flex; align-items:center; gap:6px; padding:6px 11px; border:1px solid var(--line-soft); border-radius:100px; font-size:11px; font-weight:600; color:var(--t2); letter-spacing:0.02em; transition:.12s; white-space:nowrap; }
.tbtn:hover{ border-color:var(--line); color:var(--t1); }
.tbtn.primary{ background:var(--gold); color:#0b0c11; border-color:var(--gold); font-weight:700; }
.tbtn.primary:hover{ filter:brightness(1.08); }
.tbtn.danger{ color:var(--away); border-color:oklch(0.65 0.18 25 / 0.35); }
.tbtn.start{ color:var(--score); border-color:oklch(0.72 0.15 155 / 0.35); }
.tbtn.start:hover{ background:var(--score-d); }
.tbtn .ico{ width:13px; height:13px; }
.toolbar .spacer{ flex:1; }
.toolbar .sep{ width:1px; align-self:stretch; background:var(--line-soft); margin:2px 4px; }

/* ─── Tab nav ────────────────────────────────────────────────────────── */
.tabs{ background:var(--bg-1); position:sticky; top:0; z-index:10; transition:top .26s ease; }
.tabs.docked{ top:52px; }
.tabs-primary{ display:flex; align-items:center; padding:0 16px; border-bottom:1px solid var(--line-soft); gap:2px; }
.tabs-secondary{ display:flex; align-items:center; padding:0 12px; overflow-x:auto; scrollbar-width:none; gap:0; -webkit-overflow-scrolling:touch; }
.tabs-sec-wrap{ position:relative; overflow:hidden; flex:1; min-width:0; }
.tabs-sec-wrap::after{ content:""; position:absolute; right:0; top:0; bottom:0; width:36px; background:linear-gradient(90deg, transparent, var(--bg-1) 80%); pointer-events:none; z-index:1; }
.tabs-secondary::-webkit-scrollbar{ display:none; }
.tab{ display:inline-flex; align-items:center; gap:7px; padding:13px 18px; border-bottom:2px solid transparent; font-family:var(--fui); font-size:12px; font-weight:600; letter-spacing:0.06em; color:var(--t3); text-transform:uppercase; transition:color .12s; white-space:nowrap; flex-shrink:0; cursor:pointer; }
.tab.sm{ padding:9px 14px; font-size:11px; }
.tab:hover{ color:var(--t1); }
.tab .ico{ width:15px; height:15px; opacity:.7; }
.tab.sm .ico{ width:13px; height:13px; }
.tab.on{ color:var(--t1); border-bottom-color:var(--gold); }
.tab.on .ico{ opacity:1; color:var(--gold); }
.tab.entry{ color:var(--home); }
.tab.entry.on{ border-bottom-color:var(--home); color:var(--home); }
.tabs .tab-sep{ width:1px; height:18px; background:var(--line-soft); margin:0 6px; flex-shrink:0; }

/* ─── Content area ───────────────────────────────────────────────────── */
.content{ overflow:auto; padding:24px; }
.col-2{ display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
.col-3{ display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.col-4{ display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
@media (max-width:900px){ .col-2,.col-3,.col-4{ grid-template-columns:1fr; } }

/* ─── White print theme (Ctrl/Cmd+P with HT report open) ───────────── */
@media print{
  html, body{ background:#fff !important; color:#111 !important; }
  #root > *:not(:has(.modal-shade)){ display:none !important; }
  .modal-shade{ position:static !important; background:#fff !important; }
  .modal-shade > div, .modal{ background:#fff !important; color:#111 !important;
    border:none !important; box-shadow:none !important; max-height:none !important; width:100% !important; max-width:100% !important; }
  .modal-shade *{ color:#111 !important; border-color:#ccc !important; }
  .modal-close, .tbtn{ display:none !important; }
}

/* ─── Compact phone/tablet layer ─────────────────────────────────────── */
@media (max-width:768px){
  /* Toolbar: single scrollable row instead of tall wrap */
  .toolbar{ flex-wrap:nowrap; overflow-x:auto; padding:7px 10px; gap:5px;
    -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .toolbar::-webkit-scrollbar{ display:none; }
  .tbtn{ padding:6px 9px; font-size:10px; white-space:nowrap; flex:0 0 auto; }

  /* Tabs: horizontal scroll, no squashing */
  .tabs{ overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tabs > *{ flex-wrap:nowrap !important; min-width:max-content; }
  .tab{ white-space:nowrap; padding:9px 11px !important; font-size:11px !important; }

  /* Cards & content density */
  .card{ border-radius:10px; }
  .card-b{ padding:10px 10px !important; }
  .card-h{ padding:9px 10px !important; }
  .card-h h3{ font-size:12px !important; }
  .sec-aux{ display:none; } /* hide auxiliary card subtitles on phones */

  /* Tables: never break layout — scroll inside the card */
  .card-b table{ font-size:10.5px; }
  .card-b{ overflow-x:auto; }

  /* Action buttons: bigger touch targets for pitchside logging */
  .abtn{ padding:14px 13px; font-size:14px; min-height:52px; }
  .qbtn{ min-height:50px; padding:8px 10px 7px; }
  .qbtn .sub{ display:none; } /* captions hidden on phones — 9 boxes + Other Events fit one screen */

  /* Modals: near full-screen sheets */
  .modal{ max-width:96vw !important; width:96vw !important; max-height:94vh !important;
    border-radius:12px !important; }
  .modal-b{ padding:12px !important; }

  /* KPI + scoreboard scale-down */
  .kpi-l{ font-size:9px !important; }
  .sb-score{ font-size:24px !important; }
  h1{ font-size:16px !important; }

  /* Content gutters */
  .content, .page{ padding:8px 8px 84px !important; } /* bottom clearance for tab bar */

  /* Bottom tab bar — thumb-zone navigation on phones */
  .tabs{ position:fixed !important; bottom:0 !important; top:auto !important;
    left:0; right:0; z-index:40; transition:none !important;
    border-top:1px solid var(--line-soft); border-bottom:none;
    background:var(--bg-1);
    padding-bottom:env(safe-area-inset-bottom, 0px);
    box-shadow:0 -6px 18px oklch(0 0 0 / 0.35); }
  .tab{ padding:12px 13px !important; } /* taller touch targets in the bar */

  /* Modals must clear the bottom bar */
  .modal{ max-height:calc(94vh - 56px) !important; }
}

@media (max-width:430px){
  /* Small phones: tighten further */
  .tbtn{ padding:5px 8px; font-size:9.5px; }
  .tbtn svg{ width:10px; height:10px; }
  .card-b table{ font-size:10px; }
  .abtn{ min-height:56px; } /* even bigger tap targets where it matters */
}


/* ─── Section title ──────────────────────────────────────────────────── */
.sec{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.sec-t{ display:inline-flex; align-items:center; gap:9px; font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--t2); white-space:nowrap; }
.sec-t::before{ content:""; width:4px; height:13px; border-radius:1px; background:linear-gradient(180deg, var(--home), var(--away)); flex-shrink:0; }
.sec-rule{ flex:1; height:1px; background:var(--line-soft); }
.sec-aux{ font-family:var(--fm); font-size:10px; color:var(--t3); letter-spacing:0.04em; }

/* ─── Card ──────────────────────────────────────────────────────────── */
.card{ background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r3); overflow:hidden; }
.card-h{ display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--line-soft); }
.card-h h3{ margin:0; font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--t2); }
.card-b{ padding:16px; }
.card-b.tight{ padding:10px 14px; }
.card-b.flush{ padding:0; }

/* ─── KPI tile ───────────────────────────────────────────────────────── */
.kpi{ background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r3); padding:18px 18px 16px; position:relative; overflow:hidden; }
.kpi::before{ content:""; position:absolute; left:0; right:0; top:0; height:3px; background:linear-gradient(90deg, var(--home), var(--away)); opacity:.85; }
.kpi-l{ font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--t3); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.kpi-v{ font-family:var(--fd); font-weight:600; font-size:34px; letter-spacing:-0.02em; line-height:1; color:var(--t1); font-variant-numeric:tabular-nums; white-space:nowrap; }
.kpi-v.h{ color:var(--homeL); } .kpi-v.a{ color:var(--awayL); }
.kpi-s{ font-family:var(--fm); font-size:11px; color:var(--t3); margin-top:5px; letter-spacing:0.02em; }
.kpi-s .pos{ color:var(--score); } .kpi-s .neg{ color:var(--away); }
.kpi-spark{ margin-top:8px; }

/* ─── Stat row + comparison ──────────────────────────────────────────── */
.cmp{ display:grid; grid-template-columns: 1fr 96px 1fr; gap:0; }
.cmp-row{ display:contents; }
.cmp-row > *{ padding:8px 14px; border-bottom:1px solid var(--line-soft); align-items:center; display:flex; }
.cmp-row:last-child > *{ border-bottom:0; }
.cmp-h{ justify-content:flex-end; font-family:var(--fm); font-size:14px; color:var(--t1); font-variant-numeric:tabular-nums; }
.cmp-h.win{ color:var(--homeL); font-weight:700; background:oklch(0.68 0.14 235 / 0.10); }
.cmp-a{ justify-content:flex-start; font-family:var(--fm); font-size:14px; color:var(--t1); font-variant-numeric:tabular-nums; }
.cmp-a.win{ color:var(--awayL); font-weight:700; background:oklch(0.65 0.18 25 / 0.10); }
.cmp-l{ justify-content:center; font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--t3); border-left:1px solid var(--line-soft); border-right:1px solid var(--line-soft); }

/* possession bar */
.possbar{ display:flex; height:12px; border-radius:6px; overflow:hidden; background:var(--bg-3); margin:10px 0 4px; }
.possbar .h{ background:linear-gradient(90deg, var(--homeDp), var(--home)); box-shadow:0 0 18px oklch(0.68 0.14 235 / 0.45); }
.possbar .a{ background:linear-gradient(90deg, var(--away), var(--awayDp)); box-shadow:0 0 18px oklch(0.65 0.18 25 / 0.45); }

/* ─── Chip / filter ──────────────────────────────────────────────────── */
.chip{ display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:100px; background:var(--bg-2); border:1px solid var(--line-soft); font-size:11px; font-weight:600; color:var(--t2); letter-spacing:0.04em; transition:.12s; }
.chip:hover{ border-color:var(--line); color:var(--t1); }
.chip.on{ background:var(--gold-d); border-color:var(--gold); color:var(--gold); }
.chip.h.on{ background:var(--home-d); border-color:var(--home); color:var(--home); }
.chip.a.on{ background:var(--away-d); border-color:var(--away); color:var(--away); }

/* ─── Big action button (Actions tab) ────────────────────────────────── */
.qbtn{ display:flex; flex-direction:column; align-items:flex-start; gap:3px; padding:9px 11px 8px; --accent:var(--gold); background:linear-gradient(135deg, color-mix(in oklab, var(--accent) 13%, var(--bg-1)), var(--bg-1) 68%); border:1px solid var(--line-soft); border-radius:var(--r3); transition:.14s; text-align:left; min-height:56px; position:relative; overflow:hidden; }
.qbtn:hover{ border-color:color-mix(in oklab, var(--accent) 55%, var(--line)); transform:translateY(-2px); box-shadow:0 8px 24px color-mix(in oklab, var(--accent) 24%, transparent); }
.qbtn:active{ transform:translateY(0); }
.qbtn .ico{ width:22px; height:22px; }
.qbtn .lab{ font-family:var(--fd); font-weight:600; font-size:18px; letter-spacing:-0.01em; color:var(--t1); }
.qbtn .sub{ font-size:9px; color:var(--t3); line-height:1.15; }
.qbtn::before{ content:""; position:absolute; inset:0 auto 0 0; width:3px; background:var(--accent); }
.qbtn.score{ --accent:var(--score); }
.qbtn.miss{ --accent:var(--wide); }
.qbtn.tow{ --accent:var(--home); }
.qbtn.tol{ --accent:var(--away); }
.qbtn.foul{ --accent:var(--gold); }
.qbtn.card{ --accent:var(--away); }
.qbtn.ko{ --accent:var(--violet); }
.qbtn.sub{ --accent:oklch(0.68 0.10 200); }

/* compact action button */
.abtn{ display:flex; align-items:center; gap:10px; padding:11px 13px; background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r2); transition:.12s; text-align:left; }
.abtn:hover{ border-color:var(--line); background:var(--bg-2); }
.abtn .ico{ width:16px; height:16px; color:var(--t2); }
.abtn .lab{ font-size:13px; font-weight:600; color:var(--t1); }
.abtn .sub{ font-family:var(--fm); font-size:10px; color:var(--t3); margin-left:auto; }

/* team toggle (segmented) */
.seg{ display:inline-flex; background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r2); padding:3px; gap:2px; }
.seg button{ padding:7px 16px; border-radius:var(--r1); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--t3); transition:.12s; display:inline-flex; align-items:center; gap:6px; }
.seg button:hover{ color:var(--t1); }
.seg button.on{ color:var(--t1); background:var(--bg-3); }
.seg button.on .dot{ background:currentColor; }
.seg button.on.h{ color:var(--home); }
.seg button.on.a{ color:var(--away); }
.seg .dot{ width:6px; height:6px; border-radius:50%; background:var(--t4); }

/* event row */
.evrow{ display:grid; grid-template-columns: 56px 28px 1fr auto auto; gap:12px; align-items:center; padding:10px 14px; border-bottom:1px solid var(--line-soft); transition:.1s; }
.evrow:last-child{ border-bottom:0; }
.evrow:hover{ background:var(--bg-2); }
.ev-time{ font-family:var(--fm); font-size:11px; color:var(--t3); letter-spacing:0.02em; }
.ev-dot{ width:8px; height:8px; border-radius:50%; }
.ev-main{ font-size:13px; color:var(--t1); }
.ev-main b{ color:var(--t1); font-weight:600; }
.ev-tag{ font-family:var(--fm); font-size:10px; color:var(--t3); }
.ev-pts{ font-family:var(--fm); font-size:11px; font-weight:600; color:var(--score); padding:2px 8px; background:var(--score-d); border-radius:100px; }
.ev-pts.miss{ color:var(--wide); background:oklch(0.70 0.16 45 / 0.14); }

/* table */
.tbl{ width:100%; border-collapse:collapse; }
.tbl th{ text-align:left; padding:9px 12px; font-family:var(--fui); font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--t3); border-bottom:1px solid var(--line-soft); background:var(--bg); }
.tbl td{ padding:10px 12px; font-size:12px; border-bottom:1px solid var(--line-soft); color:var(--t2); }
.tbl tbody tr:hover{ background:var(--bg-2); }
.tbl td.num{ font-family:var(--fm); font-variant-numeric:tabular-nums; text-align:right; color:var(--t1); }
.tbl td.player{ color:var(--t1); font-weight:500; }
.tbl td .pn{ display:inline-block; width:22px; height:22px; line-height:22px; text-align:center; background:var(--bg-2); border-radius:var(--r1); font-family:var(--fm); font-size:10px; color:var(--gold); margin-right:8px; }
.tbl tr.tot td{ background:var(--bg); font-weight:700; color:var(--t1); border-top:1px solid var(--line); }

/* Pitch wrapper */
.pitch-wrap{ background:var(--bg-1); border:1px solid var(--line-soft); border-radius:var(--r3); padding:12px; }

/* sparkline / mini chart */
.spark{ width:100%; height:36px; display:block; }

/* ─── Split washed card (Live hero) ─────────────────────────── */
.splitcard{ display:grid; grid-template-columns:1fr 1fr; border:1px solid var(--line-soft); border-radius:var(--r3); overflow:hidden; }
.splithalf{ padding:20px 22px; position:relative; min-width:0; }
.splithalf.h{ background:linear-gradient(160deg, oklch(0.68 0.14 235 / 0.20), oklch(0.68 0.14 235 / 0.04)); border-right:1px solid var(--line-soft); }
.splithalf.a{ background:linear-gradient(200deg, oklch(0.65 0.18 25 / 0.20), oklch(0.65 0.18 25 / 0.04)); text-align:right; }
.splithalf .nm{ font-family:var(--fui); font-size:10px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase; }
.splithalf.h .nm{ color:var(--homeL); } .splithalf.a .nm{ color:var(--awayL); }
.splithalf .big{ font-family:var(--fd); font-weight:700; font-size:46px; line-height:.85; margin:8px 0 0; color:#fff; font-variant-numeric:tabular-nums; }
.splithalf .sub{ font-family:var(--fm); font-size:11px; color:var(--t3); margin-top:10px; line-height:1.7; }
.splithalf .sub b{ color:var(--t1); font-weight:600; }
.splithalf .sub .pos{ color:var(--score); } .splithalf .sub .neg{ color:var(--wide); }

/* keyframes */
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 oklch(0.72 0.15 155 / 0.4); } 50%{ box-shadow:0 0 0 6px oklch(0.72 0.15 155 / 0); } }
@keyframes sbScorePop{ 0%{ transform:scale(1); } 22%{ transform:scale(1.16); text-shadow:0 0 22px rgba(255,255,255,.55), 0 3px 18px rgba(0,0,0,.4); } 100%{ transform:scale(1); } }
.sb-gaascore{ transform-origin:right center; }
.sb-side.a .sb-gaascore{ transform-origin:left center; }
.sb-gaascore.pop{ animation:sbScorePop .55s ease-out; }
.sb-mom{ display:flex; width:128px; height:5px; border-radius:3px; overflow:hidden; background:var(--bg-2); margin-top:2px; }
.sb-mom .h{ background:linear-gradient(90deg, var(--homeDp), var(--home)); transition:width .5s ease; }
.sb-mom .a{ background:linear-gradient(90deg, var(--away), var(--awayDp)); transition:width .5s ease; }

/* responsive */
@media (max-width:900px){
  .sb-bug{ grid-template-columns:1fr; height:auto; }
  .sb-side{ padding:18px 22px; }
  .sb-side.a{ flex-direction:row; }
  .sb-side.a .sb-tinfo{ text-align:left; }
  .sb-side.a .sb-scr{ margin-left:auto; margin-right:0; text-align:right; }
  .sb-centre{ order:-1; flex-direction:row; gap:18px; padding:14px; }
  .splitcard{ grid-template-columns:1fr; }
  .splithalf.h{ border-right:0; border-bottom:1px solid var(--line-soft); }
  .content{ padding:16px; }
}

/* modal */
.modal-shade{ position:fixed; inset:0; background:oklch(0.155 0.008 250 / 0.85); backdrop-filter:blur(4px); z-index:60; display:flex; align-items:center; justify-content:center; padding:24px; }
.modal{ width:100%; max-width:520px; max-height:90vh; background:var(--bg-1); border:1px solid var(--line); border-top:3px solid var(--team, var(--gold)); border-radius:var(--r4); display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 80px oklch(0 0 0 / 0.6); }
.modal-h{ display:flex; justify-content:space-between; align-items:center; padding:16px 20px 14px; border-bottom:1px solid var(--line-soft); background:linear-gradient(180deg, color-mix(in oklab, var(--team, var(--gold)) 12%, transparent), transparent); }
.modal-h .tag{ font-family:var(--fui); font-size:10px; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:var(--team, var(--t3)); }
.modal-h .ttl{ font-family:var(--fd); font-size:18px; font-weight:600; color:var(--t1); margin-top:2px; letter-spacing:-0.01em; }
.modal-close{ width:32px; height:32px; border-radius:50%; background:var(--bg-2); color:var(--t2); display:flex; align-items:center; justify-content:center; transition:.12s; }
.modal-close:hover{ background:var(--bg-3); color:var(--t1); }
.modal-b{ flex:1; overflow:auto; padding:18px 20px 22px; }
.modal-b .abtn{ padding:13px 14px; min-height:50px; }
.modal-steps{ display:flex; gap:5px; padding:0 20px 12px; }
.mstep{ flex:1; height:4px; border-radius:2px; background:var(--bg-3); transition:.2s; }
.mstep.done{ background:color-mix(in oklab, var(--team, var(--gold)) 55%, var(--bg-3)); }
.mstep.on{ background:var(--team, var(--gold)); box-shadow:0 0 8px color-mix(in oklab, var(--team, var(--gold)) 60%, transparent); }
@keyframes popin{ from{ transform:translateY(8px); opacity:0; } to{ transform:translateY(0); opacity:1; } }

/* outcome grid in modal */
.ogrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.ocard{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 8px; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r2); transition:.12s; }
.ocard:hover{ background:var(--bg-3); border-color:var(--line); }
.ocard .ico{ width:20px; height:20px; }
.ocard .l{ font-size:11px; font-weight:600; color:var(--t1); }
.ocard .v{ font-family:var(--fm); font-size:10px; padding:1px 7px; border-radius:100px; }
.ocard .v.s{ background:var(--score-d); color:var(--score); }
.ocard .v.m{ background:oklch(0.70 0.16 45 / 0.14); color:var(--wide); }

/* setup */
.setup{ max-width:760px; margin:0 auto; padding:40px 24px; }
.field{ display:block; margin-bottom:14px; }
.field-l{ font-family:var(--fui); font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--t3); margin-bottom:6px; }
.inp{ width:100%; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--r2); padding:11px 14px; font-size:14px; color:var(--t1); transition:.12s; }
.inp:focus{ outline:none; border-color:var(--gold); }

/* ─── Match Report ───────────────────────────────────────────────────── */
.rep-bug{ display:grid; grid-template-columns:1fr 124px 1fr; height:96px; border-radius:var(--r3); overflow:hidden; margin-bottom:24px; box-shadow:0 14px 38px oklch(0 0 0 / 0.4); }
.rep-side{ position:relative; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:0 22px; overflow:hidden; }
.rep-side.h{ background:linear-gradient(110deg, var(--washD), var(--wash)); }
.rep-side.a{ background:linear-gradient(250deg, var(--washD), var(--wash)); flex-direction:row-reverse; text-align:right; }
.rep-side::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(255,255,255,.15), transparent 45%); pointer-events:none; }
.rep-side > div{ position:relative; z-index:1; min-width:0; }
.rep-side .rl{ font-family:var(--fui); font-size:9px; font-weight:800; letter-spacing:0.24em; color:rgba(255,255,255,.7); text-transform:uppercase; }
.rep-side .rn{ font-family:var(--fd); font-weight:700; font-size:19px; color:#fff; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rep-side .rsc{ font-family:var(--fd); font-weight:700; font-size:28px; color:#fff; font-variant-numeric:tabular-nums; display:flex; align-items:baseline; gap:7px; white-space:nowrap; }
.rep-side .rt{ font-family:var(--fm); font-size:12px; color:rgba(255,255,255,.8); }
.rep-c{ background:var(--bg-2); display:flex; align-items:center; justify-content:center; text-align:center; padding:6px; }
.rep-c .rresult{ font-family:var(--fui); font-size:10px; font-weight:800; letter-spacing:0.1em; color:var(--gold); text-transform:uppercase; line-height:1.35; }
.rep-sec{ font-family:var(--fui); font-size:10px; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:var(--t2); margin-bottom:12px; display:flex; align-items:center; gap:9px; white-space:nowrap; }
.rep-sec::before{ content:""; width:4px; height:13px; border-radius:1px; background:linear-gradient(180deg, var(--home), var(--away)); }

/* ─── Insight banner ─────────────────────────────────────────────────── */
.insight{ display:flex; align-items:center; gap:12px; padding:11px 14px; margin-bottom:18px; background:linear-gradient(90deg, color-mix(in oklab, var(--tone) 14%, var(--bg-1)), var(--bg-1) 58%); border:1px solid var(--line-soft); border-left:3px solid var(--tone); border-radius:var(--r3); flex-wrap:wrap; }
.insight.good{ --tone:var(--score); }
.insight.bad{ --tone:var(--away); }
.insight-ico{ width:28px; height:28px; border-radius:7px; background:var(--gold-d); color:var(--gold); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.insight-lbl{ font-family:var(--fui); font-size:9px; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:var(--tone); flex-shrink:0; }
.insight-txt{ font-size:13px; color:var(--t1); flex:1; line-height:1.4; min-width:160px; }
.insight-dots{ display:flex; gap:4px; flex-shrink:0; }
.insight-dots span{ width:5px; height:5px; border-radius:50%; background:var(--bg-3); transition:.2s; }
.insight-dots span.on{ background:var(--tone); }
.insight-ask{ display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border:1px solid var(--line-soft); border-radius:100px; font-size:11px; font-weight:600; color:var(--t2); flex-shrink:0; transition:.12s; }
.insight-ask:hover{ border-color:var(--gold); color:var(--gold); }
.insight-x{ color:var(--t4); display:flex; flex-shrink:0; }
.insight-x:hover{ color:var(--t1); }

/* ─── Toast ──────────────────────────────────────────────────────────── */
.toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:80; background:var(--bg-3); border:1px solid var(--line); color:var(--t1); font-size:13px; font-weight:600; padding:10px 18px; border-radius:100px; box-shadow:0 10px 30px oklch(0 0 0 / 0.5); animation:toastIn .2s ease; }
@keyframes toastIn{ from{ opacity:0; transform:translate(-50%, 8px); } to{ opacity:1; transform:translate(-50%, 0); } }
@keyframes aiDot{ from{ opacity:0.2; transform:scale(0.7); } to{ opacity:1; transform:scale(1.2); } }
@keyframes livePulse{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.55); opacity:0.55; } }

/* ─── Print (Match Report only) ──────────────────────────────────────── */
@media print {
  body * { visibility:hidden !important; }
  .report-sheet, .report-sheet * { visibility:visible !important; }
  .report-sheet{ position:absolute !important; left:0; top:0; width:100%; padding:24px !important; }
  .report-noprint{ display:none !important; }
  .modal-shade{ position:absolute !important; inset:0; background:var(--bg) !important; backdrop-filter:none !important; padding:0 !important; display:block !important; }
  .modal{ max-width:none !important; height:auto !important; border:0 !important; box-shadow:none !important; }
  @page { margin:12mm; }
}
